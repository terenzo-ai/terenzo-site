<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@500&display=swap" />
<style>
* { margin:0; box-sizing:border-box; }
body { width:1200px; height:630px; background:#040D12; overflow:hidden; position:relative;
  font-family:"Hanken Grotesk",sans-serif; -webkit-font-smoothing:antialiased; }

/* Beacon: every layer hangs off one anchor so the beam originates at the dot. */
.lamp { position:absolute; right:216px; top:50%; width:0; height:0; }
.glow { position:absolute; width:1100px; height:1100px; left:-550px; top:-550px; border-radius:50%;
  background:radial-gradient(circle at center, rgba(143,224,192,0.28) 0%, rgba(78,166,153,0.17) 24%, rgba(11,79,108,0.07) 46%, transparent 66%); }
.beam { position:absolute; width:1300px; height:1300px; left:-650px; top:-650px;
  border-radius:50%; filter:blur(3px);
  /* beam centerline at compass 300 (conic 0 = up, clockwise): 287 + 13 = 300 */
  background:conic-gradient(from 287deg, transparent 0deg, rgba(143,224,192,0.13) 11deg, transparent 26deg, transparent 360deg);
  -webkit-mask-image:radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 30%, transparent 72%); }
.core { position:absolute; width:12px; height:12px; left:-6px; top:-6px;
  border-radius:50%; background:#F2FBF7;
  box-shadow:0 0 12px 4px rgba(143,224,192,0.6), 0 0 80px 30px rgba(143,224,192,0.22); }
.horizon { position:absolute; left:0; right:0; top:50%; height:1px;
  background:linear-gradient(90deg, transparent 0%, rgba(143,224,192,0.13) 45%, rgba(143,224,192,0.34) 82%, transparent 100%); }

.content { position:absolute; left:84px; top:0; bottom:0; display:flex; flex-direction:column; justify-content:center; }
.brand { display:flex; align-items:center; gap:18px; }
.brand svg { width:52px; color:#8FE0C0; }
.brand b { font-size:44px; font-weight:700; color:#EDF3F0; letter-spacing:-0.01em; }
h1 { margin-top:44px; font-size:64px; line-height:1.04; letter-spacing:-0.03em; font-weight:600;
  color:#EDF3F0; max-width:11.5em; }
h1 .hl { color:#8FE0C0; }
.sub { margin-top:36px; font-family:"IBM Plex Mono",monospace; font-size:17px; font-weight:500;
  letter-spacing:0.22em; text-transform:uppercase; color:#71877F; }
.sub b { color:#8FE0C0; font-weight:500; }
/* top and bottom hairlines for the instrument frame */
.frame-t, .frame-b { position:absolute; left:84px; right:84px; height:1px; background:rgba(143,224,192,0.16); }
.frame-t { top:54px; } .frame-b { bottom:54px; }
.frame-label { position:absolute; right:84px; top:38px; font-family:"IBM Plex Mono",monospace;
  font-size:13px; letter-spacing:0.2em; text-transform:uppercase; color:#71877F; }
</style>
</head>
<body>
  <div class="horizon"></div>
  <div class="lamp">
    <div class="glow"></div>
    <div class="beam"></div>
    <div class="core"></div>
  </div>
  <div class="frame-t"></div>
  <div class="frame-b"></div>
  <p class="frame-label">44.0801&deg; N &middot; 9.8846&deg; E</p>
  <div class="content">
    <div class="brand">
      <svg viewBox="0 0 70 44" fill="currentColor"><path d="M10 38 L10 12 L21.79 12 L21.79 22 L29.10 22 L29.10 12 L40.90 12 L40.90 22 L48.21 22 L48.21 12 L60 12 L60 38 Z"></path></svg>
      <b>Terenzo</b>
    </div>
    <h1>We bring order to how your <span class="hl">business runs.</span></h1>
    <p class="sub"><b>Operations and AI advisory</b> &middot; Mid-market &middot; CFO / COO</p>
  </div>
</body>
</html>
